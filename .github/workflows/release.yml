name: Release

# 수동 실행 전용 워크플로.
# 빌드 -> 버전 업그레이드 -> 단독 실행 exe 를 첨부한 Release 페이지 발행.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "버전 업그레이드 유형 (major=앞버전 / minor=중간버전 / patch=마지막버전)"
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch

# 버전 커밋 되돌리기 + 태그 push + Release 생성에 필요.
permissions:
  contents: write

jobs:
  release:
    # Windows 데스크톱 앱이므로 Windows 러너에서 빌드한다.
    runs-on: windows-latest

    steps:
      - name: 체크아웃 (전체 히스토리 + 태그)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rust 툴체인 설치
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 빌드 캐시
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 새 버전 계산
        id: version
        shell: bash
        run: |
          set -euo pipefail
          # tauri.conf.json 의 version 을 단일 기준(source of truth)으로 사용한다.
          current=$(jq -r '.version' src-tauri/tauri.conf.json)
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *) echo "알 수 없는 bump 유형: ${{ inputs.bump }}" >&2; exit 1 ;;
          esac
          new="${major}.${minor}.${patch}"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new"         >> "$GITHUB_OUTPUT"
          echo "tag=v$new"        >> "$GITHUB_OUTPUT"
          echo "버전 업그레이드: $current -> $new (${{ inputs.bump }})"

      - name: 버전 반영 (tauri.conf.json / package.json / Cargo.toml)
        shell: bash
        run: |
          set -euo pipefail
          new="${{ steps.version.outputs.new }}"

          tmp=$(mktemp); jq --arg v "$new" '.version = $v' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json
          tmp=$(mktemp); jq --arg v "$new" '.version = $v' package.json            > "$tmp" && mv "$tmp" package.json

          # Cargo.toml 의 [package] version (최상단, 최초 매칭 한 줄만 교체).
          sed -i "0,/^version = .*/s//version = \"$new\"/" src-tauri/Cargo.toml

      - name: 변경사항(changelog) 생성
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          prev=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          {
            if [ -n "$prev" ]; then
              echo "## 변경사항 ($prev → ${{ steps.version.outputs.tag }})"
              echo ""
              git log "${prev}..HEAD" --no-merges --pretty=format:"- %s (%h)"
            else
              echo "## 변경사항 (${{ steps.version.outputs.tag }})"
              echo ""
              git log --no-merges --pretty=format:"- %s (%h)"
            fi
            echo ""
          } > CHANGELOG_BODY.md
          echo "----- 생성된 변경사항 -----"
          cat CHANGELOG_BODY.md

      - name: 프론트엔드 의존성 설치
        run: npm ci

      - name: 단독 실행 exe 빌드 (설치파일 제외)
        # --no-bundle: NSIS/MSI 설치 프로그램을 만들지 않고 단독 실행 바이너리만 컴파일.
        run: npm run tauri build -- --no-bundle

      - name: 릴리스 자산 준비
        id: asset
        shell: bash
        run: |
          set -euo pipefail
          new="${{ steps.version.outputs.new }}"
          # Cargo 패키지명이 ai-config 이므로 산출물은 ai-config.exe.
          src="src-tauri/target/release/ai-config.exe"
          if [ ! -f "$src" ]; then
            echo "빌드 산출물을 찾을 수 없습니다: $src" >&2
            ls -la src-tauri/target/release || true
            exit 1
          fi
          mkdir -p release-assets
          out="release-assets/AI-Ready_${new}.exe"
          cp "$src" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: 버전 업그레이드 커밋 되돌리기 & 태그 push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json package.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Release 페이지 발행 (단독 실행 exe 첨부)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.asset.outputs.path }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file CHANGELOG_BODY.md
